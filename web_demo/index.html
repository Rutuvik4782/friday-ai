<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#00d4ff;--secondary:#ff6b35;--accent:#7b2ff7;--bg:#030810;--success:#00ff88;--text:#e0e0e0;--border:#1a2a3a}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
.splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity 0.8s,visibility 0.8s}
.splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
.splash-logo{font-family:'Orbitron',sans-serif;font-size:4rem;font-weight:900;color:var(--primary);text-shadow:0 0 30px var(--primary),0 0 60px var(--primary);letter-spacing:0.3em;animation:pulse 2s infinite}
.splash-sub{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--text);margin-top:1rem;opacity:0.7;letter-spacing:0.2em}
.splash-bar{width:300px;height:3px;background:#1a2a3a;margin-top:2rem;border-radius:2px;overflow:hidden}
.splash-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));width:0;transition:width 0.1s}
.splash-status{font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:var(--primary);margin-top:1rem;opacity:0.8}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.top-bar{height:60px;background:linear-gradient(180deg,rgba(0,212,255,0.1),transparent);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:relative;z-index:100}
.logo{display:flex;align-items:center;gap:0.8rem}
.logo-icon{width:40px;height:40px;background:radial-gradient(circle,var(--primary) 0%,transparent 70%);border-radius:50%;animation:glow 2s infinite;position:relative}
.logo-icon::before{content:'';position:absolute;inset:25%;background:var(--primary);border-radius:50%;box-shadow:0 0 20px var(--primary)}
.logo-text{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:700;color:var(--primary);letter-spacing:0.2em;text-shadow:0 0 10px var(--primary)}
.top-indicators{display:flex;gap:1.5rem;align-items:center}
.indicator{display:flex;align-items:center;gap:0.4rem;font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--success)}
.indicator-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:blink 1s infinite}
.indicator-dot.orange{background:var(--secondary);animation-delay:0.5s}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.top-controls{display:flex;gap:0.8rem}
.top-btn{width:36px;height:36px;border:1px solid var(--border);background:rgba(0,212,255,0.05);border-radius:8px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all 0.3s}
.top-btn:hover{background:rgba(0,212,255,0.15);border-color:var(--primary);color:var(--primary)}
.main-container{display:grid;grid-template-columns:280px 1fr 280px;height:calc(100vh - 60px);position:relative;overflow:hidden}
.canvas-bg{position:fixed;inset:0;z-index:0;opacity:0.3}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px);pointer-events:none;z-index:1}
.grid-overlay{position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:1}
.left-panel{background:rgba(3,8,16,0.9);border-right:1px solid var(--border);padding:1.5rem;display:flex;flex-direction:column;gap:1.5rem;position:relative;z-index:10;overflow-y:auto}
.arc-reactor{width:180px;height:180px;margin:0 auto;position:relative}
.arc-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--primary);opacity:0.3}
.arc-ring:nth-child(1){inset:0;animation:rotate 8s linear infinite}
.arc-ring:nth-child(2){inset:10px;animation:rotate 6s linear infinite reverse}
.arc-ring:nth-child(3){inset:20px;animation:rotate 10s linear infinite}
.arc-ring:nth-child(4){inset:30px;animation:rotate 7s linear infinite reverse}
.arc-ring:nth-child(5){inset:40px;animation:rotate 9s linear infinite}
.arc-ring:nth-child(6){inset:50px;animation:rotate 5s linear infinite reverse}
.arc-ring:nth-child(7){inset:60px;animation:rotate 11s linear infinite}
.arc-core{position:absolute;inset:70px;background:radial-gradient(circle,var(--primary) 0%,transparent 70%);border-radius:50%;animation:glow 1.5s infinite}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--primary),0 0 40px var(--primary)}50%{box-shadow:0 0 30px var(--primary),0 0 60px var(--primary)}}
.panel-title{font-family:'Orbitron',sans-serif;font-size:0.8rem;color:var(--primary);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.8rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
.quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:0.5rem}
.quick-btn{background:rgba(0,212,255,0.05);border:1px solid var(--border);border-radius:8px;padding:0.8rem 0.5rem;cursor:pointer;transition:all 0.3s;text-align:center}
.quick-btn:hover{background:rgba(0,212,255,0.15);border-color:var(--primary);transform:translateY(-2px)}
.quick-btn-icon{font-size:1.2rem;margin-bottom:0.3rem}
.quick-btn-text{font-family:'Rajdhani',sans-serif;font-size:0.75rem;color:var(--text);font-weight:500}
.session-memory{background:rgba(0,0,0,0.3);border-radius:8px;padding:1rem;border:1px solid var(--border);flex:1;min-height:150px;max-height:250px;overflow-y:auto}
.memory-item{display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.8rem}
.memory-label{color:var(--text);opacity:0.7}
.memory-value{color:var(--primary);font-family:'Share Tech Mono',monospace}
.center-panel{display:flex;flex-direction:column;position:relative;z-index:10}
.chat-header{height:50px;background:rgba(3,8,16,0.8);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:1rem}
.chat-status{font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:var(--primary)}
.chat-container{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.msg{max-width:80%;padding:1rem 1.2rem;border-radius:15px;font-size:0.95rem;line-height:1.5;animation:fadeIn 0.3s}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--accent),#5a1fbd);color:#fff;border-bottom-right-radius:5px}
.msg.ai{align-self:flex-start;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);border-bottom-left-radius:5px;color:var(--text)}
.msg.ai code{background:rgba(0,0,0,0.5);padding:0.2rem 0.4rem;border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:0.85rem;display:block;white-space:pre-wrap;margin:0.5rem 0}
.msg.ai pre{background:rgba(0,0,0,0.5);padding:1rem;border-radius:8px;overflow-x:auto;margin:0.5rem 0}
.msg.ai pre code{background:transparent;padding:0}
.msg-time{font-size:0.7rem;opacity:0.5;margin-top:0.3rem;font-family:'Share Tech Mono',monospace}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.thinking{background:rgba(0,212,255,0.05);border:1px solid var(--border);border-radius:15px;padding:1rem 1.5rem;display:flex;gap:0.3rem;width:fit-content;align-items:center}
.thinking-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:bounce 1.4s infinite}
.thinking-dot:nth-child(2){animation-delay:0.2s}
.thinking-dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.5}40%{transform:scale(1);opacity:1}}
.typing-indicator{display:none;background:rgba(0,212,255,0.05);border:1px solid var(--border);border-radius:15px;padding:1rem 1.5rem;width:fit-content}
.typing-bars{display:flex;gap:4px;align-items:center;height:20px}
.typing-bar{width:3px;height:12px;background:var(--primary);border-radius:2px;animation:typing 1s infinite}
.typing-bar:nth-child(2){animation-delay:0.1s}
.typing-bar:nth-child(3){animation-delay:0.2s}
@keyframes typing{0%,100%{height:8px}50%{height:20px}}
.input-area{background:rgba(3,8,16,0.9);border-top:1px solid var(--border);padding:1rem 1.5rem;display:flex;gap:0.8rem;align-items:flex-end}
.input-wrapper{flex:1;position:relative}
#msgInput{width:100%;background:rgba(0,0,0,0.5);border:1px solid var(--border);border-radius:12px;padding:0.8rem 1rem;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;resize:none;min-height:45px;max-height:150px;outline:none;transition:border-color 0.3s}

.send-btn{width:45px;height:45px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent));border:none;cursor:pointer;color:#fff;font-size:1.2rem;transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.send-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(0,212,255,0.5)}
.voice-btn{width:45px;height:45px;border-radius:12px;background:rgba(0,212,255,0.1);border:1px solid var(--border);cursor:pointer;color:var(--primary);font-size:1.2rem;transition:all 0.3s;display:flex;align-items:center;justify-content:center;position:relative}

.system-status{background:rgba(0,0,0,0.3);border-radius:8px;padding:1rem;border:1px solid var(--border)}
.status-row{display:flex;justify-content:space-between;align-items:center;padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.status-row:last-child{border-bottom:none}

.capabilities-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.5rem}
.capability{background:rgba(0,212,255,0.05);border:1px solid var(--border);border-radius:8px;padding:0.8rem;text-align:center;transition:all 0.3s;cursor:pointer}
.capability:hover{border-color:var(--primary);background:rgba(0,212,255,0.1)}
.capability-icon{font-size:1.2rem;margin-bottom:0.3rem}
.capability-name{font-size:0.75rem;font-weight:500}
.suggested-prompts{display:flex;flex-direction:column;gap:0.5rem}
.suggested-btn{background:rgba(0,212,255,0.05);border:1px solid var(--border);border-radius:8px;padding:0.7rem 1rem;text-align:left;font-family:'Rajdhani',sans-serif;font-size:0.85rem;color:var(--text);cursor:pointer;transition:all 0.3s}
.suggested-btn:hover{background:rgba(0,212,255,0.15);border-color:var(--primary);color:var(--primary)}
.command-palette{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:flex-start;justify-content:center;padding-top:15vh;z-index:1000}
.command-palette.active{display:flex}
.command-search{width:600px;max-width:90vw;background:rgba(3,8,16,0.98);border:1px solid var(--primary);border-radius:12px;overflow:hidden;box-shadow:0 0 50px rgba(0,212,255,0.3)}
.command-input-wrap{padding:1rem;display:flex;align-items:center;gap:0.8rem;border-bottom:1px solid var(--border)}
.command-input-wrap span{color:var(--primary);font-size:1.2rem}
.command-input{background:transparent;border:none;outline:none;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1.1rem;flex:1}
.command-results{max-height:400px;overflow-y:auto}
.command-item{padding:0.8rem 1rem;display:flex;align-items:center;gap:1rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.05);transition:background 0.2s}
.command-item:hover,.command-item.selected{background:rgba(0,212,255,0.1)}
.command-item-icon{width:30px;height:30px;background:rgba(0,212,255,0.1);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--primary)}
.command-item-text{flex:1}
.command-item-name{font-weight:500;margin-bottom:0.2rem}
.command-item-desc{font-size:0.8rem;opacity:0.6}
.command-item-shortcut{font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--primary);background:rgba(0,212,255,0.1);padding:0.2rem 0.5rem;border-radius:4px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--primary)}
</style>
</head>

<script>
const API_URL='https://friday-ai-2hbv.onrender.com/chat';
let conversation=[];
let msgHistory=[];
let historyIndex=-1;
let isRecording=false;
let recognition=null;
let isMuted=false;
let particlesCanvas,particlesCtx;
let particles=[];
let startTime=Date.now();

const commands=[{icon:'💬',name:'Send Message',desc:'Type and send a message',shortcut:'Enter'},{icon:'🎤',name:'Voice Input',desc:'Toggle voice recording',shortcut:'Ctrl+V'},{icon:'🗑',name:'Clear Chat',desc:'Clear all messages',shortcut:'Ctrl+L'},{icon:'⌘',name:'Command Palette',desc:'Search commands',shortcut:'Ctrl+K'},{icon:'🔊',name:'Toggle Sound',desc:'Enable/disable TTS',shortcut:'Ctrl+M'},{icon:'🌤',name:'Weather',desc:'Check weather',shortcut:'Ctrl+W'},{icon:'📰',name:'News',desc:'Latest news',shortcut:'Ctrl+N'}];

function initParticles(){
particlesCanvas=document.getElementById('particles');
particlesCtx=particlesCanvas.getContext('2d');
particlesCanvas.width=window.innerWidth;
particlesCanvas.height=window.innerHeight;
for(let i=0;i<80;i++)particles.push({x:Math.random()*particlesCanvas.width,y:Math.random()*particlesCanvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,size:Math.random()*2+1});
animateParticles();
}

function animateParticles(){
particlesCtx.clearRect(0,0,particlesCanvas.width,particlesCanvas.height);
particles.forEach((p,i)=>{
p.x+=p.vx;p.y+=p.vy;
if(p.x<0||p.x>particlesCanvas.width)p.vx*=-1;
if(p.y<0||p.y>particlesCanvas.height)p.vy*=-1;
particlesCtx.beginPath();
particlesCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
particlesCtx.fillStyle='rgba(0,212,255,0.5)';
particlesCtx.fill();
particles.forEach((p2,j)=>{
if(i===j)return;
const dx=p.x-p2.x,dy=p.y-p2.y,dist=Math.sqrt(dx*dx+dy*dy);
if(dist<120){
particlesCtx.beginPath();
particlesCtx.moveTo(p.x,p.y);
particlesCtx.lineTo(p2.x,p2.y);
particlesCtx.strokeStyle=`rgba(0,212,255,${0.2-dist/600})`;
particlesCtx.stroke();
}
});
});
requestAnimationFrame(animateParticles);
}

function initSplash(){
const statuses=['INITIALIZING NEURAL NETWORKS...','LOADING AI MODELS...','ESTABLISHING SECURE CONNECTION...','CALIBRATING VOICE SYSTEMS...','F.R.I.D.A.Y. IS ONLINE'];
let i=0,progress=0;
const fill=document.getElementById('splashFill');
const status=document.getElementById('splashStatus');
const interval=setInterval(()=>{
progress+=Math.random()*15+5;
if(progress>100)progress=100;
fill.style.width=progress+'%';
if(progress<30)status.textContent=statuses[0];
else if(progress<55)status.textContent=statuses[1];
else if(progress<75)status.textContent=statuses[2];
else if(progress<90)status.textContent=statuses[3];
else status.textContent=statuses[4];
if(progress>=100){
clearInterval(interval);
setTimeout(()=>{document.getElementById('splash').classList.add('hidden');initChat();},500);
}
},200);
}

function initChat(){
addMessage('ai','Good evening, Rutwik. I am F.R.I.D.A.Y., your personal AI assistant. How may I help you today?');
updateMemory();
}

function addMessage(type,text){
const container=document.getElementById('chatContainer');
const msg=document.createElement('div');
msg.className=`msg ${type}`;
const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
let formattedText=text;
if(type==='ai'){
formattedText=formatCode(text);
}
msg.innerHTML=`${formattedText}<div class="msg-time">${time}</div>`;
container.appendChild(msg);
container.scrollTop=container.scrollHeight;
document.getElementById('msgCount').textContent=conversation.length;
}

function formatCode(text){
return text.replace(/```(\w*)\n?([\s\S]*?)```/g,(match,lang,code)=>`<pre><code class="lang-${lang}">${escapeHtml(code.trim())}</code></pre>`).replace(/`([^`]+)`/g,'<code>$1</code>');
}

function escapeHtml(text){
return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showThinking(){
const container=document.getElementById('chatContainer');
const thinking=document.createElement('div');
thinking.className='thinking';
thinking.id='thinking';
thinking.innerHTML='<div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>';
container.appendChild(thinking);
container.scrollTop=container.scrollHeight;
}

function hideThinking(){
const thinking=document.getElementById('thinking');
if(thinking)thinking.remove();
}

async function sendMessage(){
const input=document.getElementById('msgInput');
const text=input.value.trim();
if(!text)return;
input.value='';
input.style.height='auto';
conversation.push({role:'user',content:text});
msgHistory.push(text);
historyIndex=msgHistory.length;
addMessage('user',text);
showThinking();
const start=Date.now();
try{
const response=await fetch(API_URL,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:text,history:conversation.slice(-10)})
});
const data=await response.json();
hideThinking();
const reply=data.response||data.reply||'I apologize, but I encountered an error processing your request.';
conversation.push({role:'assistant',content:reply});
addMessage('ai',reply);
document.getElementById('responseSpeed').textContent=(Date.now()-start)+'ms';
if(!isMuted)speak(reply);
updateMemory();
}catch(e){
hideThinking();
addMessage('ai','I apologize, Rutwik. I am experiencing connectivity issues with my core systems. Please try again in a moment.');
}
}

function sendQuick(type){
const prompts={weather:'What is the weather like today?',news:'What are the latest news headlines?',code:'Help me write a Python function to sort a list.',search:'Search for information about artificial intelligence.',translate:'Translate "Hello, how are you?" to Spanish.',remind:'Set a reminder for me.'};
document.getElementById('msgInput').value=prompts[type]||'';
sendMessage();
}

function sendSuggestion(text){
document.getElementById('msgInput').value=text;
sendMessage();
}

function speak(text){
if(isMuted)return;
const utterance=new SpeechSynthesisUtterance(text);
utterance.rate=1;
utterance.pitch=1;
utterance.volume=0.9;
speechSynthesis.speak(utterance);
}

function toggleVoice(){
const voiceBtn=document.getElementById('voiceBtn');
const visualizer=document.getElementById('voiceVisualizer');
if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
addMessage('ai','Voice input is not supported in your browser.');
return;
}
if(isRecording){
recognition.stop();
isRecording=false;
voiceBtn.classList.remove('recording');
visualizer.style.display='none';
}else{
recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
recognition.lang='en-US';
recognition.interimResults=false;
recognition.maxAlternatives=1;
recognition.onresult=(e)=>{
const transcript=e.results[0][0].transcript;
document.getElementById('msgInput').value=transcript;
sendMessage();
};
recognition.onerror=()=>{
isRecording=false;
voiceBtn.classList.remove('recording');
visualizer.style.display='none';
};
recognition.onend=()=>{
isRecording=false;
voiceBtn.classList.remove('recording');
visualizer.style.display='none';
};
for(let i=0;i<12;i++){
const bar=document.createElement('div');
bar.className='voice-bar';
bar.style.height='5px';
visualizer.appendChild(bar);
}
visualizer.style.display='flex';
voiceBtn.classList.add('recording');
recognition.start();
animateVisualizer();
}
}

function animateVisualizer(){
if(!isRecording)return;
const bars=document.querySelectorAll('.voice-bar');
bars.forEach(bar=>bar.style.height=Math.random()*15+5+'px');
requestAnimationFrame(animateVisualizer);
}

function toggleMute(){
isMuted=!isMuted;
document.getElementById('muteBtn').textContent=isMuted?'🔇':'🔊';
addMessage('ai',isMuted?'Voice output has been disabled.':'Voice output has been enabled.');
}

function clearChat(){
document.getElementById('chatContainer').innerHTML='';
conversation=[];
document.getElementById('msgCount').textContent='0';
updateMemory();
}

function updateMemory(){
const memoryList=document.getElementById('memoryList');
const uptime=Math.floor((Date.now()-startTime)/1000);
const mins=Math.floor(uptime/60);
memoryList.innerHTML=`
<div class="memory-item"><span class="memory-label">Session Start</span><span class="memory-value">${new Date(startTime).toLocaleTimeString()}</span></div>
<div class="memory-item"><span class="memory-label">Uptime</span><span class="memory-value">${mins}m</span></div>
<div class="memory-item"><span class="memory-label">Messages</span><span class="memory-value">${conversation.length}</span></div>
`;
}

function toggleCommandPalette(){
const palette=document.getElementById('commandPalette');
palette.classList.toggle('active');
if(palette.classList.contains('active')){
document.getElementById('commandInput').focus();
renderCommands(commands);
}
}

function renderCommands(filtered){
const results=document.getElementById('commandResults');
results.innerHTML=filtered.map((c,i)=>`
<div class="command-item${i===0?' selected':''}" onclick="executeCommand('${c.name}')">
<div class="command-item-icon">${c.icon}</div>
<div class="command-item-text"><div class="command-item-name">${c.name}</div><div class="command-item-desc">${c.desc}</div></div>
<div class="command-item-shortcut">${c.shortcut}</div>
</div>
`).join('');
}

function filterCommands(){
const q=document.getElementById('commandInput').value.toLowerCase();
const filtered=commands.filter(c=>c.name.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q));
renderCommands(filtered);
}

function executeCommand(name){
toggleCommandPalette();
switch(name){
case'Send Message':document.getElementById('msgInput').focus();break;
case'Voice Input':toggleVoice();break;
case'Clear Chat':clearChat();break;
case'Command Palette':break;
case'Toggle Sound':toggleMute();break;
case'Weather':sendQuick('weather');break;
case'News':sendQuick('news');break;
}
}

document.addEventListener('keydown',e=>{
if(e.ctrlKey&&e.key==='k'){e.preventDefault();toggleCommandPalette();}
if(e.ctrlKey&&e.key==='v'){e.preventDefault();toggleVoice();}
if(e.ctrlKey&&e.key==='l'){e.preventDefault();clearChat();}
if(e.ctrlKey&&e.key==='m'){e.preventDefault();toggleMute();}
if(e.ctrlKey&&e.key==='w'){e.preventDefault();sendQuick('weather');}
if(e.ctrlKey&&e.key==='n'){e.preventDefault();sendQuick('news');}
if(e.key==='ArrowUp'&&msgHistory.length){
if(historyIndex>0)historyIndex--;
document.getElementById('msgInput').value=msgHistory[historyIndex]||'';
}
if(e.key==='ArrowDown'&&msgHistory.length){
if(historyIndex<msgHistory.length-1)historyIndex++;
document.getElementById('msgInput').value=msgHistory[historyIndex]||'';
}
});

document.getElementById('msgInput').addEventListener('keydown',e=>{
if(e.key==='Enter'&&!e.shiftKey){
e.preventDefault();
sendMessage();
}
});

document.getElementById('msgInput').addEventListener('input',function(){
this.style.height='auto';
this.style.height=Math.min(this.scrollHeight,150)+'px';
});

document.getElementById('commandPalette').addEventListener('click',e=>{
if(e.target.id==='commandPalette')toggleCommandPalette();
});

setInterval(()=>{
document.getElementById('sysTime').textContent=new Date().toLocaleTimeString();
},1000);

setInterval(updateMemory,30000);

window.addEventListener('resize',()=>{
particlesCanvas.width=window.innerWidth;
particlesCanvas.height=window.innerHeight;
});

initParticles();
initSplash();
</script>
</body>
</html>
